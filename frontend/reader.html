<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIBRUM — Lire</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--ink:#0e0c09;--parchment:#f9f4ec;--gold:#b8972a;--text:#2a2520;--text-muted:#7a7068;--border:#ddd8cf;}
*{margin:0;padding:0;box-sizing:border-box;}

body{font-family:'Inter',sans-serif;background:var(--parchment);color:var(--text);transition:background 0.3s,color 0.3s;}
body.night{background:#111009;color:#d4cfc7;}
body.sepia{background:#f0e6d0;color:#3a2e20;}

/* TOP BAR */
.reader-nav{position:fixed;top:0;left:0;right:0;height:52px;z-index:50;display:flex;align-items:center;padding:0 2rem;gap:1rem;transition:all 0.3s;background:rgba(249,244,236,0.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);}
body.night .reader-nav{background:rgba(17,16,9,0.95);border-bottom-color:rgba(255,255,255,0.05);}
body.sepia .reader-nav{background:rgba(240,230,208,0.95);}
.reader-nav.hidden{transform:translateY(-100%);}
.rn-back{font-size:0.78rem;color:var(--text-muted);text-decoration:none;display:flex;align-items:center;gap:0.4rem;transition:color 0.2s;}
.rn-back:hover{color:var(--gold);}
body.night .rn-back{color:rgba(255,255,255,0.4);}
.rn-title{flex:1;font-family:'Cinzel',serif;font-size:0.85rem;font-weight:600;color:var(--text);letter-spacing:0.06em;text-align:center;}
body.night .rn-title{color:rgba(255,255,255,0.7);}
.rn-progress{flex:1;text-align:center;font-size:0.72rem;color:var(--text-muted);}
body.night .rn-progress{color:rgba(255,255,255,0.3);}
.rn-controls{display:flex;align-items:center;gap:0.5rem;}
.rn-btn{width:30px;height:30px;border:1px solid var(--border);background:none;cursor:pointer;font-size:0.8rem;color:var(--text-muted);display:flex;align-items:center;justify-content:center;transition:all 0.15s;border-radius:2px;}
.rn-btn:hover{border-color:var(--gold);color:var(--gold);}
body.night .rn-btn{border-color:rgba(255,255,255,0.08);color:rgba(255,255,255,0.4);}

/* PROGRESS BAR */
.read-progress-bar{position:fixed;top:52px;left:0;right:0;height:2px;background:rgba(0,0,0,0.05);z-index:49;}
.rpb-fill{height:100%;background:var(--gold);transition:width 0.1s;width:0%;}

/* SETTINGS PANEL */
.settings-panel{position:fixed;top:52px;right:0;width:280px;background:white;border:1px solid var(--border);border-top:none;padding:1.5rem;z-index:48;transform:translateX(100%);transition:transform 0.3s;}
body.night .settings-panel{background:#1a1810;border-color:rgba(255,255,255,0.06);}
.settings-panel.open{transform:translateX(0);}
.sp-section{margin-bottom:1.2rem;border-bottom:1px solid var(--border);padding-bottom:1.2rem;}
body.night .sp-section{border-bottom-color:rgba(255,255,255,0.04);}
.sp-label{font-size:0.65rem;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;color:var(--text-muted);margin-bottom:0.6rem;}
body.night .sp-label{color:rgba(255,255,255,0.25);}
.font-size-ctrl{display:flex;align-items:center;gap:0.8rem;}
.fsc-btn{width:28px;height:28px;border:1px solid var(--border);background:none;cursor:pointer;font-size:1rem;color:var(--text-muted);display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.fsc-btn:hover{border-color:var(--gold);color:var(--gold);}
.fsc-val{font-family:'Cinzel',serif;font-size:0.9rem;font-weight:600;min-width:30px;text-align:center;}
.theme-btns{display:flex;gap:0.4rem;}
.theme-btn{flex:1;padding:0.4rem;border:1px solid var(--border);background:none;cursor:pointer;font-size:0.72rem;font-weight:500;color:var(--text-muted);transition:all 0.2s;}
.theme-btn.active{border-color:var(--gold);color:var(--gold);}
.font-btns{display:flex;gap:0.4rem;}
.font-btn{flex:1;padding:0.4rem;border:1px solid var(--border);background:none;cursor:pointer;font-size:0.78rem;color:var(--text-muted);transition:all 0.2s;}
.font-btn.active{border-color:var(--gold);color:var(--gold);}
.lh-slider{width:100%;accent-color:var(--gold);}

/* CHAPTER TOC */
.toc-panel{position:fixed;top:52px;left:0;width:260px;background:white;border:1px solid var(--border);border-top:none;height:calc(100vh - 52px);overflow-y:auto;z-index:48;transform:translateX(-100%);transition:transform 0.3s;padding:1rem 0;}
body.night .toc-panel{background:#1a1810;border-color:rgba(255,255,255,0.06);}
.toc-panel.open{transform:translateX(0);}
.toc-title{font-family:'Cinzel',serif;font-size:0.72rem;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;color:var(--text-muted);padding:0 1.2rem;margin-bottom:0.8rem;}
body.night .toc-title{color:rgba(255,255,255,0.25);}
.toc-item{padding:0.6rem 1.2rem;cursor:pointer;transition:background 0.15s;border-left:3px solid transparent;font-size:0.82rem;color:var(--text-muted);}
.toc-item:hover{background:rgba(184,151,42,0.05);}
.toc-item.active{border-left-color:var(--gold);color:var(--text);font-weight:500;}
body.night .toc-item{color:rgba(255,255,255,0.4);}
body.night .toc-item.active{color:rgba(255,255,255,0.85);}
.toc-progress-bar{width:6px;height:6px;border-radius:50%;background:var(--border);float:right;margin-top:5px;}
.toc-progress-bar.read{background:var(--gold);}

/* MAIN READER */
.reader-body{padding-top:52px;min-height:100vh;display:flex;justify-content:center;}
.reader-content-wrap{width:100%;max-width:680px;padding:4rem 2rem 6rem;}
.chapter-title{font-family:'Cinzel',serif;font-size:1.2rem;font-weight:600;color:var(--text-muted);margin-bottom:3rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border);letter-spacing:0.08em;}
body.night .chapter-title{color:rgba(255,255,255,0.3);border-bottom-color:rgba(255,255,255,0.06);}
#reader-text{font-family:'Cormorant Garamond',serif;font-size:1.25rem;line-height:1.95;color:var(--text);}
body.night #reader-text{color:#c8c3bb;}
body.sepia #reader-text{color:#3a2e20;}
#reader-text p{margin-bottom:1.5rem;text-indent:2em;}
#reader-text p:first-child{text-indent:0;}
#reader-text h2{font-family:'Cinzel',serif;font-size:1rem;font-weight:600;color:var(--text-muted);margin:2.5rem 0 1.5rem;text-indent:0;letter-spacing:0.08em;}
#reader-text em{font-style:italic;}
#reader-text blockquote{border-left:3px solid var(--gold);padding:0.5rem 1.5rem;margin:2rem 0;font-style:italic;color:var(--text-muted);text-indent:0;}

/* CHAPTER NAV */
.chapter-nav{display:flex;justify-content:space-between;align-items:center;margin-top:4rem;padding-top:2rem;border-top:1px solid var(--border);}
body.night .chapter-nav{border-top-color:rgba(255,255,255,0.06);}
.ch-nav-btn{padding:0.7rem 1.2rem;border:1px solid var(--border);background:none;cursor:pointer;font-family:'Cinzel',serif;font-size:0.78rem;font-weight:600;letter-spacing:0.08em;color:var(--text-muted);transition:all 0.2s;}
.ch-nav-btn:hover{border-color:var(--gold);color:var(--gold);}
body.night .ch-nav-btn{border-color:rgba(255,255,255,0.08);color:rgba(255,255,255,0.4);}
.ch-nav-center{font-size:0.72rem;color:var(--text-muted);text-align:center;}
body.night .ch-nav-center{color:rgba(255,255,255,0.25);}

/* VOTE PROMPT */
.vote-prompt{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--parchment);padding:1rem 2rem;display:flex;align-items:center;gap:1.5rem;box-shadow:0 8px 32px rgba(0,0,0,0.3);animation:slideUp 0.4s ease;display:none;}
@keyframes slideUp{from{transform:translateX(-50%) translateY(20px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
.vote-prompt.show{display:flex;}
.vp-text{font-family:'Cormorant Garamond',serif;font-size:1rem;font-style:italic;}
.vp-stars{display:flex;gap:0.3rem;}
.vp-star{font-size:1.3rem;background:none;border:none;cursor:pointer;color:rgba(255,255,255,0.3);transition:color 0.15s;}
.vp-star:hover,.vp-star.active{color:var(--gold);}
.vp-close{background:none;border:none;color:rgba(255,255,255,0.3);cursor:pointer;font-size:1.1rem;transition:color 0.2s;}
.vp-close:hover{color:var(--parchment);}
</style>
</head>
<body>

<!-- TOP BAR -->
<nav class="reader-nav" id="reader-nav">
  <a href="javascript:history.back()" class="rn-back">← Retour</a>
  <div class="rn-title" id="rn-title">Chargement…</div>
  <div class="rn-progress" id="rn-progress">0%</div>
  <div class="rn-controls">
    <button class="rn-btn" onclick="toggleTOC()" title="Table des matières">☰</button>
    <button class="rn-btn" onclick="toggleSettings()" title="Paramètres">⚙</button>
    <button class="rn-btn" onclick="toggleBookmark()" id="bm-btn" title="Marque-page">♡</button>
    <a href="" class="rn-btn" id="donate-quick" title="Soutenir" style="text-decoration:none;">♦</a>
  </div>
</nav>

<div class="read-progress-bar"><div class="rpb-fill" id="rpb-fill"></div></div>

<!-- TOC -->
<div class="toc-panel" id="toc-panel">
  <div class="toc-title">Chapitres</div>
  <div id="toc-list"></div>
</div>

<!-- SETTINGS -->
<div class="settings-panel" id="settings-panel">
  <div class="sp-section">
    <div class="sp-label">Taille du texte</div>
    <div class="font-size-ctrl">
      <button class="fsc-btn" onclick="changeFontSize(-1)">A-</button>
      <div class="fsc-val" id="font-size-val">20</div>
      <button class="fsc-btn" onclick="changeFontSize(1)">A+</button>
    </div>
  </div>
  <div class="sp-section">
    <div class="sp-label">Thème</div>
    <div class="theme-btns">
      <button class="theme-btn active" onclick="setTheme(this,'')">Jour</button>
      <button class="theme-btn" onclick="setTheme(this,'sepia')">Sépia</button>
      <button class="theme-btn" onclick="setTheme(this,'night')">Nuit</button>
    </div>
  </div>
  <div class="sp-section">
    <div class="sp-label">Police</div>
    <div class="font-btns">
      <button class="font-btn active" onclick="setFont(this,'Cormorant Garamond')" style="font-family:'Cormorant Garamond'">Garamond</button>
      <button class="font-btn" onclick="setFont(this,'Georgia')" style="font-family:Georgia">Georgia</button>
      <button class="font-btn" onclick="setFont(this,'Inter')" style="font-family:Inter">Sans</button>
    </div>
  </div>
  <div class="sp-section" style="border-bottom:none;margin-bottom:0;">
    <div class="sp-label">Interligne</div>
    <input class="lh-slider" type="range" min="140" max="240" value="195" oninput="setLineHeight(this.value)">
  </div>
</div>

<!-- READER BODY -->
<div class="reader-body">
  <div class="reader-content-wrap">
    <div class="chapter-title" id="chapter-title">—</div>
    <div id="reader-text"></div>
    <div class="chapter-nav">
      <button class="ch-nav-btn" id="btn-prev" onclick="prevChapter()">← Précédent</button>
      <div class="ch-nav-center" id="ch-nav-center">—</div>
      <button class="ch-nav-btn" id="btn-next" onclick="nextChapter()">Suivant →</button>
    </div>
  </div>
</div>

<!-- VOTE PROMPT -->
<div class="vote-prompt" id="vote-prompt">
  <div class="vp-text">Qu'avez-vous pensé de cette œuvre ?</div>
  <div class="vp-stars" id="vp-stars">
    <button class="vp-star" onclick="quickVote(1)">★</button>
    <button class="vp-star" onclick="quickVote(2)">★</button>
    <button class="vp-star" onclick="quickVote(3)">★</button>
    <button class="vp-star" onclick="quickVote(4)">★</button>
    <button class="vp-star" onclick="quickVote(5)">★</button>
  </div>
  <button class="vp-close" onclick="document.getElementById('vote-prompt').classList.remove('show')">✕</button>
</div>

<script>
const workId = new URLSearchParams(location.search).get('id') || '11';
let currentChapter = 0;
let fontSize = 20;
let bookmarked = false;
let hasVoted = false;

const CONTENT = {
  title:'Le Dernier Griot',
  chapters:[
    {id:'0',title:'Prologue',content:`
      <p>La nuit tombait sur le village de Koundara lorsque le vieux Koffi sortit sa kora pour la dernière fois. Ses mains, usées par soixante-dix années de vie, tremblaient légèrement sur les calebasses tendues de peau. Mais sa voix, elle, restait intacte — gravée dans l'éternité du chant.</p>
      <p>Son petit-fils Mamadou l'observait depuis le seuil de la case, les yeux grands ouverts. À treize ans, il ne comprenait pas encore pourquoi les larmes du vieillard semblaient couler à l'envers — non pas vers la terre, mais vers le ciel.</p>
      <p>— <em>Tu dois apprendre</em>, murmura Koffi. <em>Pas pour moi. Pour eux.</em></p>
      <p>Il désigna l'horizon, là où les étoiles commençaient à percer le velours du soir. Mamadou suivit le geste sans comprendre. Il ne savait pas encore que <em>eux</em> désignait tous les morts qui attendaient d'être racontés.</p>
      <p>La kora se mit à vibrer. Et dans ce son unique, suspendu entre deux mondes, Mamadou entendit pour la première fois la voix de son arrière-arrière-grand-mère — morte cent vingt ans plus tôt — qui chantait quelque chose sur la mer et l'oubli.</p>
    `},
    {id:'1',title:'Chapitre 1 — Le chant des ancêtres',content:`
      <p>Trois semaines plus tôt, les hommes de la compagnie minière étaient arrivés dans leurs 4x4 blancs. Ils avaient des chemises propres, des stylos dorés et des sourires qui ne montaient jamais jusqu'aux yeux. Le chef du village les avait reçus sous l'arbre à palabres avec la dignité ordinaire des hommes qui savent déjà que la décision est prise.</p>
      <p>Koffi n'avait pas assisté à la réunion. Il savait ce qu'ils voulaient. Depuis le temps qu'on lui proposait d'acheter sa terre, de racheter sa mémoire, de numériser ses chants pour les mettre sur des plateformes où personne n'écouterait vraiment.</p>
      <p>Il était resté dans sa case à tresser une corde de rônier, les doigts habitués à ce travail silencieux qui laisse l'esprit libre. Dans son crâne, les voix des ancêtres s'entrechoquaient comme des calebasses dans le vent.</p>
      <blockquote>Ce qui se perd ne disparaît pas. Il attend, quelque part entre les vivants et les oubliés, que quelqu'un prononce son nom.</blockquote>
      <p>C'était la formule que lui avait transmise son père, qui la tenait du sien, remontant ainsi jusqu'à un temps où Koundara n'était encore que quelques huttes autour d'un puits. Les griots ne mouraient pas. Ils s'endormaient dans la bouche de leurs successeurs.</p>
      <p>Mais Mamadou voulait être ingénieur. Il l'avait dit à table, entre deux bouchées de riz, avec cette désinvolture tranquille des adolescents qui n'imaginent pas encore que certaines phrases peuvent briser quelque chose d'irréparable.</p>
    `},
    {id:'2',title:'Chapitre 2 — La proposition',content:`
      <p>M. Chen arriva le lendemain matin, seul cette fois, dans une petite voiture poussiéreuse qui jurait avec le standing habituel de ses collègues. Koffi le reçut sur le pas de sa porte sans l'inviter à entrer.</p>
      <p>— Monsieur Koffi, dit l'homme en français soigné, je ne suis pas ici pour vous acheter quoi que ce soit. Je suis chercheur. Ethnomusicologue. Je veux seulement enregistrer.</p>
      <p>— Pour qui ? demanda le vieux.</p>
      <p>— Pour personne. Pour tout le monde. Pour les archives nationales. Pour que dans cent ans, quelqu'un puisse encore entendre.</p>
      <p>Koffi le regarda longtemps. Il y avait quelque chose d'honnête dans ce visage fatiqué, dans ces yeux qui n'essayaient pas de convaincre. Un homme qui n'attendait pas de réponse favorable. Ça, c'était rare.</p>
      <p>— Revenez ce soir, dit finalement Koffi. Quand le soleil touche le tamarinier.</p>
      <p>M. Chen hocha la tête et repartit sans un mot de plus. Koffi rentra dans sa case et s'allongea sur sa natte. Pour la première fois depuis des mois, il n'entendit pas les voix des ancêtres. Juste le vent dans les herbes, et au loin, le rire de Mamadou qui jouait avec les autres enfants du village.</p>
      <p>C'était peut-être une forme de permission.</p>
    `},
  ]
};

function init() {
  document.getElementById('rn-title').textContent = CONTENT.title;
  document.getElementById('donate-quick').href = `work.html?id=${workId}`;

  // Build TOC
  const toc = document.getElementById('toc-list');
  CONTENT.chapters.forEach((ch,i)=>{
    const el = document.createElement('div');
    el.className = 'toc-item' + (i===0?' active':'');
    el.innerHTML = ch.title + `<div class="toc-progress-bar ${i===0?'read':''}"></div>`;
    el.onclick = ()=>{ gotoChapter(i); toggleTOC(); };
    toc.appendChild(el);
  });

  showChapter(0);
  trackProgress();
}

function showChapter(idx) {
  currentChapter = idx;
  const ch = CONTENT.chapters[idx];
  document.getElementById('chapter-title').textContent = ch.title;
  document.getElementById('reader-text').innerHTML = ch.content;
  document.getElementById('ch-nav-center').textContent = `${idx+1} / ${CONTENT.chapters.length}`;
  document.getElementById('btn-prev').disabled = idx===0;
  document.getElementById('btn-next').textContent = idx===CONTENT.chapters.length-1 ? 'Fin ✦' : 'Suivant →';

  document.querySelectorAll('.toc-item').forEach((el,i)=>{
    el.classList.toggle('active',i===idx);
  });

  window.scrollTo(0,52);
  applyReadingSettings();
}

function gotoChapter(idx){ showChapter(idx); }
function prevChapter(){ if(currentChapter>0) showChapter(currentChapter-1); }
function nextChapter(){
  if(currentChapter<CONTENT.chapters.length-1) showChapter(currentChapter+1);
  else { if(!hasVoted) setTimeout(()=>document.getElementById('vote-prompt').classList.add('show'),500); }
}

// PROGRESS
function trackProgress() {
  window.addEventListener('scroll', ()=>{
    const doc = document.documentElement;
    const scrolled = doc.scrollTop;
    const total = doc.scrollHeight - doc.clientHeight;
    const pct = total>0 ? (scrolled/total*100) : 0;
    document.getElementById('rpb-fill').style.width = pct+'%';
    document.getElementById('rn-progress').textContent = Math.round(pct)+'%';

    // Auto-hide nav
    const nav = document.getElementById('reader-nav');
    if (scrolled > 100) nav.classList.add('hidden');
    else nav.classList.remove('hidden');

    // Show vote prompt at 80%
    if (pct > 80 && !hasVoted && currentChapter===CONTENT.chapters.length-1) {
      setTimeout(()=>document.getElementById('vote-prompt').classList.add('show'), 1000);
    }
  });

  // Show on mouse move near top
  document.addEventListener('mousemove', e=>{
    if (e.clientY < 80) document.getElementById('reader-nav').classList.remove('hidden');
  });
}

// SETTINGS
let settingsOpen=false, tocOpen=false;
function toggleSettings(){ settingsOpen=!settingsOpen; document.getElementById('settings-panel').classList.toggle('open',settingsOpen); if(tocOpen){tocOpen=false;document.getElementById('toc-panel').classList.remove('open');} }
function toggleTOC(){ tocOpen=!tocOpen; document.getElementById('toc-panel').classList.toggle('open',tocOpen); if(settingsOpen){settingsOpen=false;document.getElementById('settings-panel').classList.remove('open');} }

function changeFontSize(d){
  fontSize = Math.max(14,Math.min(28,fontSize+d));
  document.getElementById('font-size-val').textContent = fontSize;
  document.getElementById('reader-text').style.fontSize = fontSize+'px';
}

function setTheme(btn, cls){
  document.body.className = cls;
  document.querySelectorAll('.theme-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function setFont(btn, font){
  document.getElementById('reader-text').style.fontFamily = font+',serif';
  document.querySelectorAll('.font-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function setLineHeight(v){
  document.getElementById('reader-text').style.lineHeight = (v/100);
}

function applyReadingSettings(){
  document.getElementById('reader-text').style.fontSize = fontSize+'px';
}

function toggleBookmark(){
  bookmarked = !bookmarked;
  document.getElementById('bm-btn').style.color = bookmarked ? 'var(--gold)' : '';
  document.getElementById('bm-btn').textContent = bookmarked ? '♦' : '♡';
}

function quickVote(r){
  document.querySelectorAll('.vp-star').forEach((s,i)=>s.classList.toggle('active',i<r));
  hasVoted = true;
  setTimeout(()=>{ document.getElementById('vote-prompt').classList.remove('show'); }, 1500);
}

document.addEventListener('DOMContentLoaded', init);

// Keyboard shortcuts
document.addEventListener('keydown', e=>{
  if (e.key==='ArrowRight'||e.key==='PageDown') nextChapter();
  if (e.key==='ArrowLeft'||e.key==='PageUp') prevChapter();
  if (e.key==='Escape'){ settingsOpen=false; tocOpen=false; document.getElementById('settings-panel').classList.remove('open'); document.getElementById('toc-panel').classList.remove('open'); }
});
</script>
</body>
</html>
